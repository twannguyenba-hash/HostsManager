name: Hosven
options:
  bundleIdPrefix: com.twannguyen
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0
settings:
  base:
    MARKETING_VERSION: "1.1.0" # x-release-please-version
    CURRENT_PROJECT_VERSION: "1.1.0" # x-release-please-version
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    SWIFT_VERSION: "5.9"
targets:
  Hosven:
    type: application
    platform: macOS
    sources:
      - Hosven
    info:
      # Explicit Info.plist needed because Xcode's INFOPLIST_KEY_* prefix only
      # injects a whitelist of Apple-standard keys — third-party keys like
      # Sparkle's SUFeedURL/SUPublicEDKey are silently dropped, leaving the
      # app unable to verify updates.
      path: Hosven/Info.plist
      properties:
        CFBundleDisplayName: Hosven
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleInfoDictionaryVersion: "6.0"
        LSUIElement: false
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: ""
        SUFeedURL: https://twan-nguyen.github.io/hosven/appcast.xml
        SUPublicEDKey: +Zr28RWwnEsDnMCS7kkbbyd2lg7iCvYgmdUt6VNBTrY=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Hosven/Hosven.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.twannguyen.hosven
        SWIFT_OBJC_BRIDGING_HEADER: Hosven/Hosven-Bridging-Header.h
    dependencies:
      - sdk: Security.framework
      - package: Sparkle
  HosvenTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Hosven
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.twannguyen.hosven.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Hosven.app/Contents/MacOS/Hosven"
  HosvenUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests
    dependencies:
      - target: Hosven
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.twannguyen.hosven.uitests
        TEST_TARGET_NAME: Hosven
schemes:
  Hosven:
    build:
      targets:
        Hosven: all
        HosvenTests: [test]
        HosvenUITests: [test]
    test:
      targets:
        - HosvenTests
        - HosvenUITests
      gatherCoverageData: true
