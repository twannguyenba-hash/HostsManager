name: HostsManager
options:
  bundleIdPrefix: com.hostsmanager
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
settings:
  base:
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    SWIFT_VERSION: "5.9"
targets:
  HostsManager:
    type: application
    platform: macOS
    sources:
      - HostsManager
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_CFBundleDisplayName: HostsManager
        CODE_SIGN_ENTITLEMENTS: HostsManager/HostsManager.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.hostsmanager.app
        SWIFT_OBJC_BRIDGING_HEADER: HostsManager/HostsManager-Bridging-Header.h
    dependencies:
      - sdk: Security.framework
